<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="pi-top" x1="8" y1="4" x2="24" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8f87a"/>
      <stop offset="100%" stop-color="#c8f042"/>
    </linearGradient>
    <linearGradient id="pi-left" x1="4" y1="14" x2="16" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9fcc2e"/>
      <stop offset="100%" stop-color="#5a7814"/>
    </linearGradient>
    <linearGradient id="pi-right" x1="16" y1="14" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b8e030"/>
      <stop offset="100%" stop-color="#7aa820"/>
    </linearGradient>
    <linearGradient id="ray1" x1="16" y1="16" x2="31" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8f042" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c8f042" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray2" x1="16" y1="17" x2="32" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7b5cff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7b5cff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray3" x1="16" y1="18" x2="29" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Light rays -->
  <line x1="16" y1="16" x2="31" y2="8"  stroke="url(#ray1)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="32" y2="17" stroke="url(#ray2)" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="16" y1="18" x2="29" y2="28" stroke="url(#ray3)" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Prism faces -->
  <polygon points="16,3 28,14 4,14"  fill="url(#pi-top)"/>
  <polygon points="4,14 16,29 16,14"  fill="url(#pi-left)"/>
  <polygon points="28,14 16,29 16,14" fill="url(#pi-right)"/>

  <!-- Edge highlights -->
  <line x1="16" y1="3"  x2="4"  y2="14" stroke="#e2f570" stroke-width="0.7" opacity="0.7"/>
  <line x1="16" y1="3"  x2="28" y2="14" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>
  <line x1="4"  y1="14" x2="16" y2="29" stroke="#6a9c18" stroke-width="0.5" opacity="0.6"/>
  <line x1="28" y1="14" x2="16" y2="29" stroke="#8fc020" stroke-width="0.5" opacity="0.5"/>
</svg>
